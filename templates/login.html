<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pyGallery - Entrar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-body">
    <div class="auth-page-container">

        <div class="auth-left-panel">
            <div class="auth-form-wrapper">

                <div class="auth-header">
                    <h1 class="auth-brand">pyGallery</h1>
                </div>

                <h2 class="auth-title">Iniciar sesión</h2>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div class="alerta-{{ 'exito' if category == 'exito' else 'error' }}">
                    {{ message }}
                </div>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="POST">
                    <input type="text" name="username" placeholder="Usuario" required>
                    <input type="password" name="password" placeholder="Contraseña" required>
                    <input type="submit" value="Entrar">
                </form>

                <p class="auth-link">
                    ¿No tienes cuenta? <a href="/registro">Regístrate gratis</a>
                </p>
            </div>
        </div>

        <div class="auth-right-panel">
            <div class="landing-background auth-background-grid"></div>
        </div>

    </div>
</body>

</html>
