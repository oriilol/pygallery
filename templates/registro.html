<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pyGallery - Crear Cuenta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <div class="form-container">
        <h2 style="margin-bottom: 20px; color: #f8fafc;">Crear Cuenta</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alerta-{{ 'exito' if category == 'exito' else 'error' }}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/registro">
            <input type="text" name="username" placeholder="Nuevo Usuario" required>
            <input type="password" name="password" placeholder="Nueva Contraseña" required>
            <input type="submit" value="Registrarse">
        </form>

        <p style="margin-top: 20px; font-size: 0.9em;">
            ¿Ya tienes cuenta? <a href="/login" style="color: #3b82f6;">Inicia sesion</a>
        </p>
    </div>

</body>

</html>
